<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snoopy's House Studio - Turnos</title>
    <style>
        /* --- ACÁ ESTÁ EL DISEÑO (CSS) --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fff5f8;
            color: #444;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        header h1 { color: #d81b60; }
        main {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            margin: 20px auto;
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
            display: block;
        }
        button {
            background-color: #d81b60;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        #btnConfirmarWA { background-color: #25d366 !important; }
        .alias-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px dashed #d81b60;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Snoopy's House Studio 💅</h1>
        <p>Reservá tu turno de forma fácil y rápida</p>
    </header>

    <main>
        <section id="formulario">
            <h3>1. Elegí tu servicio</h3>
            <select id="servicio">
                <option value="21000">Soft Gel - $21.000</option>
                <option value="16500">Semipermanente - $16.500</option>
                <option value="13000">Tradicional - $13.000</option>
                <option value="18500">Kapping/ Baño Acrílico - $18.500</option>
                <option value="23000">Polygel - $23.000</option>
                <option value="20000">Dermaplaning - $20.000</option>
                <option value="18500">Higiene facial - $18.500</option>
                <option value="24000">Despigmentación - $24.000</option>
                <option value="15000">Higiene Express - $15.000</option>
            </select>

            <h3>2. Elegí fecha y hora</h3>
            <input type="date" id="fecha">
            <input type="time" id="hora">

            <h3>3. Tus datos</h3>
            <input type="text" id="nombre" placeholder="Tu nombre completo">
            <button id="btnReservar">Reservar Turno</button>
        </section>

        <section id="seccionPago" style="display: none; border-top: 2px solid #d81b60; padding-top: 20px;">
            <h3 style="color: #d81b60;">💳 ¡Casi listo!</h3>
            <p id="detalleSena"></p>
            <p>Para confirmar, enviá la seña al Alias:</p>
            <div class="alias-box">Romi-sambrano</div>
            <button id="btnConfirmarWA">Enviar Comprobante por WhatsApp</button>
        </section>
    </main>

    <script>
        // --- ACÁ ESTÁ LA LÓGICA (JS) ---
        window.onload = function() {
            const btnReservar = document.getElementById('btnReservar');

            btnReservar.onclick = function() {
                const servicioSelect = document.getElementById('servicio');
                const precioTotal = parseFloat(servicioSelect.value);
                const nombre = document.getElementById('nombre').value;
                const fecha = document.getElementById('fecha').value;
                const hora = document.getElementById('hora').value;

                if (nombre === "" || fecha === "" || hora === "") {
                    alert("Romi, te falta completar algún dato 💅");
                    return;
                }

                const montoSena = precioTotal * 0.35;
                const seccionPago = document.getElementById('seccionPago');
                const detalleSena = document.getElementById('detalleSena');

                detalleSena.innerHTML = `El valor de la seña es de <strong>$${montoSena.toFixed(2)}</strong> (35%)`;
                seccionPago.style.display = 'block';
                btnReservar.style.display = 'none';

                window.reservaActual = {
                    cliente: nombre,
                    servicio: servicioSelect.options[servicioSelect.selectedIndex].text.split(' - ')[0],
                    dia: fecha,
                    hora: hora,
                    pago: montoSena.toFixed(2)
                };
            };

            document.getElementById('btnConfirmarWA').onclick = function() {
                const r = window.reservaActual;
                const mensaje = `¡Hola! Soy ${r.cliente}. Realicé la seña de $${r.pago} para: ${r.servicio} el día ${r.dia} a las ${r.hora}.`;
                const url = `https://wa.me/5493541232593?text=${encodeURIComponent(mensaje)}`;
                window.open(url, '_blank');
            };
        };
    </script>
</body>
</html>
